<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Esempi di campi di input</title>
</head>
<body>
  <h1>Esempi di campi di input</h1>
  <form action="" method="post">
    <h2>Esempio di campo di testo</h2>
    <p>
      Inserisci il nome <input type="text" name="nome" placeholder="Inserisci il nome">
    </p>
    <h2>Esempio di password</h2>
    <p>
      Inserisci la tua password <input type="password" name="password">
    </p>
    <h2>Esempio di campo di tipo date</h2>
    <p>Inserisci la tua data di nascita: <input type="date" name="data_nascita"></p>
    <p><input type="submit" value="Registrati"></p>
  </form>
</body>
</html>
